project:
  type: website
  output-dir: docs
  resources:
    - .nojekyll
    - robots.txt

website:
  title: "Sam Hsu"
  site-url: https://yuehyahsu.github.io
  description: "Sam Hsu — PhD candidate at the University of Chicago Harris School of Public Policy studying refugee welfare in developing countries through randomized field experiments."
  image: files/sam_headshot.jpeg
  open-graph: true
  twitter-card: true

format:
  html:
    theme: cosmo
    css:
      - styles.css
      - custom.css
    include-before-body: _sidebar.html
    include-in-header:
      - text: |
          <script data-goatcounter="https://yuehyahsu.goatcounter.com/count"
                  async src="//gc.zgo.at/count.js"></script>
    toc: false
    footnotes-hover: true
    code-copy: true
    smooth-scroll: true
    link-external-newwindow: true
    page-layout: full
    grid:
      body-width: 750px
