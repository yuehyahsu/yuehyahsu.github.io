project:
  type: website
  output-dir: docs
  resources:
    - .nojekyll

website:
  title: "Sam Hsu"

format:
  html:
    theme: cosmo
    css:
      - styles.css
      - custom.css
    include-before-body: _sidebar.html
    include-in-header:
      - text: |
          <script data-goatcounter="https://yuehyahsu.goatcounter.com/count"
                  async src="//gc.zgo.at/count.js"></script>
    toc: false
    footnotes-hover: true
    code-copy: true
    smooth-scroll: true
    link-external-newwindow: true
    page-layout: full
    grid:
      body-width: 750px
